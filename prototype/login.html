<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>去K书 - 登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4F6EF7',
            'primary-light': '#E8EDFF',
            'primary-dark': '#3A56D4',
          }
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #F5F6FA;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; }

    .press-effect:active {
      transform: scale(0.97);
      transition: transform 0.1s;
    }

    /* Tab indicator slide */
    .tab-indicator {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Form panel transition */
    .form-panel {
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .form-panel.hidden-panel {
      opacity: 0;
      transform: translateX(30px);
      position: absolute;
      pointer-events: none;
    }
    .form-panel.active-panel {
      opacity: 1;
      transform: translateX(0);
      position: relative;
      pointer-events: auto;
    }

    /* Input focus ring */
    .input-field:focus-within {
      border-color: #4F6EF7;
      box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.1);
    }

    /* Checkbox custom */
    .custom-checkbox {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border: 1.5px solid #d1d5db;
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .custom-checkbox:checked {
      background: #4F6EF7;
      border-color: #4F6EF7;
    }
    .custom-checkbox:checked::after {
      content: '';
      position: absolute;
      top: 1.5px;
      left: 4.5px;
      width: 5px;
      height: 8px;
      border: solid white;
      border-width: 0 1.5px 1.5px 0;
      transform: rotate(45deg);
    }

    /* Verification code button */
    .code-btn {
      transition: all 0.2s;
    }
    .code-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Floating decoration */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .float-anim {
      animation: float 4s ease-in-out infinite;
    }
    .float-anim-delay {
      animation: float 4s ease-in-out 1s infinite;
    }

    /* Social button press */
    .social-btn:active {
      transform: scale(0.93);
      transition: transform 0.1s;
    }

    /* Password toggle */
    .pwd-toggle {
      cursor: pointer;
      transition: color 0.2s;
    }
    .pwd-toggle:hover {
      color: #4F6EF7;
    }
  </style>
</head>
<body>

  <!-- ==================== iOS STATUS BAR ==================== -->
  <div class="fixed top-0 left-0 right-0 z-50 bg-transparent h-11 flex items-center justify-between px-6">
    <span class="font-semibold text-sm text-[#2D3436]">9:41</span>
    <div class="w-[120px] h-[34px] bg-black rounded-full mt-1"></div>
    <div class="flex items-center gap-1.5 text-sm text-[#2D3436]">
      <i class="fa-solid fa-signal text-xs"></i>
      <i class="fa-solid fa-wifi text-xs"></i>
      <i class="fa-solid fa-battery-full text-xs"></i>
    </div>
  </div>

  <!-- ==================== MAIN CONTENT ==================== -->
  <main class="min-h-screen bg-[#F5F6FA] relative overflow-hidden">

    <!-- Decorative background shapes -->
    <div class="absolute top-20 -right-16 w-48 h-48 bg-primary/5 rounded-full blur-2xl float-anim"></div>
    <div class="absolute top-56 -left-20 w-56 h-56 bg-purple-400/5 rounded-full blur-2xl float-anim-delay"></div>

    <div class="relative z-10 px-6 pt-16">

      <!-- ===== LOGO & BRANDING ===== -->
      <div class="text-center mt-8 mb-8">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-primary to-[#6C5CE7] rounded-3xl shadow-lg shadow-primary/20 mb-4">
          <i class="fa-solid fa-book-open text-white text-3xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-[#2D3436]">去K书</h1>
        <p class="text-sm text-[#636E72] mt-1.5">专注学习，遇见更好的自己</p>
      </div>

      <!-- ===== LOGIN / REGISTER TABS ===== -->
      <div class="relative bg-white rounded-2xl p-1 flex mb-6 shadow-sm">
        <div class="absolute top-1 left-1 w-[calc(50%-4px)] h-[calc(100%-8px)] bg-primary rounded-xl tab-indicator" id="tabIndicator"></div>
        <button onclick="switchTab('login')" id="tabLogin" class="relative z-10 flex-1 py-2.5 text-sm font-semibold text-white rounded-xl transition-colors duration-300">
          登录
        </button>
        <button onclick="switchTab('register')" id="tabRegister" class="relative z-10 flex-1 py-2.5 text-sm font-semibold text-[#636E72] rounded-xl transition-colors duration-300">
          注册
        </button>
      </div>

      <!-- ===== LOGIN FORM ===== -->
      <div id="loginPanel" class="form-panel active-panel">

        <!-- Phone Number -->
        <div class="mb-3">
          <label class="block text-xs font-medium text-[#636E72] mb-1.5 ml-1">手机号</label>
          <div class="input-field flex items-center bg-white rounded-xl border border-gray-200 px-4 h-12 transition-all duration-200">
            <div class="flex items-center gap-1.5 pr-3 border-r border-gray-100">
              <span class="text-sm font-medium text-[#2D3436]">+86</span>
              <i class="fa-solid fa-chevron-down text-[10px] text-[#B2BEC3]"></i>
            </div>
            <input type="tel" maxlength="11" placeholder="请输入手机号"
                   class="flex-1 h-full bg-transparent text-sm text-[#2D3436] placeholder-gray-300 outline-none ml-3">
          </div>
        </div>

        <!-- Verification Code -->
        <div class="mb-4">
          <label class="block text-xs font-medium text-[#636E72] mb-1.5 ml-1">验证码</label>
          <div class="input-field flex items-center bg-white rounded-xl border border-gray-200 h-12 transition-all duration-200 overflow-hidden">
            <div class="flex items-center pl-4 flex-1">
              <i class="fa-solid fa-shield-halved text-gray-300 text-sm mr-3"></i>
              <input type="text" maxlength="6" placeholder="请输入验证码"
                     class="h-full bg-transparent text-sm text-[#2D3436] placeholder-gray-300 outline-none w-full">
            </div>
            <button onclick="startCountdown(this)" class="code-btn px-4 h-full text-xs font-semibold text-primary whitespace-nowrap border-l border-gray-100">
              获取验证码
            </button>
          </div>
        </div>

        <!-- Login Button -->
        <button onclick="handleLogin()" id="loginBtn"
                class="w-full h-12 bg-gradient-to-r from-primary to-[#6C5CE7] text-white rounded-xl text-sm font-semibold shadow-lg shadow-primary/25 press-effect flex items-center justify-center gap-2">
          <span>登录</span>
        </button>

        <!-- Divider -->
        <div class="flex items-center gap-3 my-5">
          <div class="flex-1 h-px bg-gray-200"></div>
          <span class="text-xs text-[#B2BEC3]">其他方式登录</span>
          <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <!-- Social Login -->
        <div class="flex justify-center gap-8">
          <!-- WeChat -->
          <button class="social-btn flex flex-col items-center gap-1.5 press-effect cursor-pointer">
            <div class="w-12 h-12 rounded-full bg-[#07C160]/10 flex items-center justify-center">
              <i class="fa-brands fa-weixin text-[#07C160] text-xl"></i>
            </div>
            <span class="text-[10px] text-[#636E72]">微信</span>
          </button>
          <!-- Apple -->
          <button class="social-btn flex flex-col items-center gap-1.5 press-effect cursor-pointer">
            <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center">
              <i class="fa-brands fa-apple text-[#2D3436] text-xl"></i>
            </div>
            <span class="text-[10px] text-[#636E72]">Apple</span>
          </button>
          <!-- QQ -->
          <button class="social-btn flex flex-col items-center gap-1.5 press-effect cursor-pointer">
            <div class="w-12 h-12 rounded-full bg-[#12B7F5]/10 flex items-center justify-center">
              <i class="fa-brands fa-qq text-[#12B7F5] text-xl"></i>
            </div>
            <span class="text-[10px] text-[#636E72]">QQ</span>
          </button>
        </div>

        <!-- Agreement -->
        <div class="flex items-start gap-2 mt-5 px-1">
          <input type="checkbox" class="custom-checkbox mt-0.5" checked>
          <p class="text-[10px] text-[#B2BEC3] leading-relaxed">
            登录即表示同意
            <a href="#" class="text-primary">《用户服务协议》</a>和<a href="#" class="text-primary">《隐私政策》</a>
          </p>
        </div>
      </div>

      <!-- ===== REGISTER FORM ===== -->
      <div id="registerPanel" class="form-panel hidden-panel">

        <!-- Nickname -->
        <div class="mb-3">
          <label class="block text-xs font-medium text-[#636E72] mb-1.5 ml-1">昵称</label>
          <div class="input-field flex items-center bg-white rounded-xl border border-gray-200 px-4 h-12 transition-all duration-200">
            <i class="fa-regular fa-user text-gray-300 text-sm mr-3"></i>
            <input type="text" maxlength="20" placeholder="请输入昵称"
                   class="flex-1 h-full bg-transparent text-sm text-[#2D3436] placeholder-gray-300 outline-none">
            <span class="text-[10px] text-[#B2BEC3]">2-20字</span>
          </div>
        </div>

        <!-- Phone Number -->
        <div class="mb-3">
          <label class="block text-xs font-medium text-[#636E72] mb-1.5 ml-1">手机号</label>
          <div class="input-field flex items-center bg-white rounded-xl border border-gray-200 px-4 h-12 transition-all duration-200">
            <div class="flex items-center gap-1.5 pr-3 border-r border-gray-100">
              <span class="text-sm font-medium text-[#2D3436]">+86</span>
              <i class="fa-solid fa-chevron-down text-[10px] text-[#B2BEC3]"></i>
            </div>
            <input type="tel" maxlength="11" placeholder="请输入手机号"
                   class="flex-1 h-full bg-transparent text-sm text-[#2D3436] placeholder-gray-300 outline-none ml-3">
          </div>
        </div>

        <!-- Verification Code -->
        <div class="mb-3">
          <label class="block text-xs font-medium text-[#636E72] mb-1.5 ml-1">验证码</label>
          <div class="input-field flex items-center bg-white rounded-xl border border-gray-200 h-12 transition-all duration-200 overflow-hidden">
            <div class="flex items-center pl-4 flex-1">
              <i class="fa-solid fa-shield-halved text-gray-300 text-sm mr-3"></i>
              <input type="text" maxlength="6" placeholder="请输入验证码"
                     class="h-full bg-transparent text-sm text-[#2D3436] placeholder-gray-300 outline-none w-full">
            </div>
            <button onclick="startCountdown(this)" class="code-btn px-4 h-full text-xs font-semibold text-primary whitespace-nowrap border-l border-gray-100">
              获取验证码
            </button>
          </div>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label class="block text-xs font-medium text-[#636E72] mb-1.5 ml-1">设置密码</label>
          <div class="input-field flex items-center bg-white rounded-xl border border-gray-200 px-4 h-12 transition-all duration-200">
            <i class="fa-solid fa-lock text-gray-300 text-sm mr-3"></i>
            <input type="password" maxlength="20" placeholder="请设置6-20位密码"
                   class="flex-1 h-full bg-transparent text-sm text-[#2D3436] placeholder-gray-300 outline-none" id="regPwd">
            <i class="fa-regular fa-eye pwd-toggle text-gray-300" onclick="togglePwd('regPwd', this)"></i>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
          <label class="block text-xs font-medium text-[#636E72] mb-1.5 ml-1">确认密码</label>
          <div class="input-field flex items-center bg-white rounded-xl border border-gray-200 px-4 h-12 transition-all duration-200">
            <i class="fa-solid fa-lock text-gray-300 text-sm mr-3"></i>
            <input type="password" maxlength="20" placeholder="请再次输入密码"
                   class="flex-1 h-full bg-transparent text-sm text-[#2D3436] placeholder-gray-300 outline-none" id="regPwdConfirm">
            <i class="fa-regular fa-eye pwd-toggle text-gray-300" onclick="togglePwd('regPwdConfirm', this)"></i>
          </div>
        </div>

        <!-- Password Strength Indicator -->
        <div class="flex items-center gap-2 mb-4 ml-1">
          <div class="flex gap-1">
            <div class="w-8 h-1 rounded-full bg-primary"></div>
            <div class="w-8 h-1 rounded-full bg-primary"></div>
            <div class="w-8 h-1 rounded-full bg-gray-200"></div>
          </div>
          <span class="text-[10px] text-[#636E72]">密码强度：中</span>
        </div>

        <!-- Invite Code (Optional) -->
        <div class="mb-4">
          <label class="block text-xs font-medium text-[#636E72] mb-1.5 ml-1">
            邀请码 <span class="text-[#B2BEC3]">（选填）</span>
          </label>
          <div class="input-field flex items-center bg-white rounded-xl border border-gray-200 px-4 h-12 transition-all duration-200">
            <i class="fa-solid fa-gift text-gray-300 text-sm mr-3"></i>
            <input type="text" maxlength="10" placeholder="输入邀请码可获额外优惠"
                   class="flex-1 h-full bg-transparent text-sm text-[#2D3436] placeholder-gray-300 outline-none">
          </div>
        </div>

        <!-- Register Button -->
        <button onclick="handleRegister()" id="registerBtn"
                class="w-full h-12 bg-gradient-to-r from-primary to-[#6C5CE7] text-white rounded-xl text-sm font-semibold shadow-lg shadow-primary/25 press-effect flex items-center justify-center gap-2">
          <span>注册</span>
        </button>

        <!-- Agreement -->
        <div class="flex items-start gap-2 mt-4 px-1">
          <input type="checkbox" class="custom-checkbox mt-0.5" checked>
          <p class="text-[10px] text-[#B2BEC3] leading-relaxed">
            注册即表示同意
            <a href="#" class="text-primary">《用户服务协议》</a>和<a href="#" class="text-primary">《隐私政策》</a>
          </p>
        </div>
      </div>

      <!-- ===== BOTTOM TIP ===== -->
      <div class="text-center mt-8 mb-6">
        <p class="text-[10px] text-[#B2BEC3]">
          <i class="fa-solid fa-shield-halved mr-1"></i>
          您的信息已加密传输，请放心使用
        </p>
      </div>

    </div>
  </main>

  <!-- ==================== LOGIN SUCCESS MODAL ==================== -->
  <div id="loginSuccessModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/40 hidden" style="backdrop-filter: blur(4px);">
    <div class="bg-white rounded-3xl p-6 mx-8 w-full max-w-xs text-center" style="animation: popIn 0.3s ease;">
      <div class="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fa-solid fa-check text-green-500 text-2xl"></i>
      </div>
      <h3 class="text-lg font-bold text-[#2D3436] mb-1">登录成功</h3>
      <p class="text-sm text-[#636E72] mb-5">欢迎回来，学习达人！</p>
      <button onclick="document.getElementById('loginSuccessModal').classList.add('hidden')"
              class="w-full h-11 bg-primary text-white rounded-xl text-sm font-semibold press-effect">
        开始学习
      </button>
    </div>
  </div>

  <style>
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.85); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>

  <!-- ==================== SCRIPTS ==================== -->
  <script>
    let currentTab = 'login';

    function switchTab(tab) {
      if (tab === currentTab) return;
      currentTab = tab;

      const indicator = document.getElementById('tabIndicator');
      const loginBtn = document.getElementById('tabLogin');
      const registerBtn = document.getElementById('tabRegister');
      const loginPanel = document.getElementById('loginPanel');
      const registerPanel = document.getElementById('registerPanel');

      if (tab === 'login') {
        indicator.style.transform = 'translateX(0)';
        loginBtn.classList.replace('text-[#636E72]', 'text-white');
        registerBtn.classList.replace('text-white', 'text-[#636E72]');
        loginPanel.classList.replace('hidden-panel', 'active-panel');
        registerPanel.classList.replace('active-panel', 'hidden-panel');
      } else {
        indicator.style.transform = 'translateX(100%)';
        registerBtn.classList.replace('text-[#636E72]', 'text-white');
        loginBtn.classList.replace('text-white', 'text-[#636E72]');
        registerPanel.classList.replace('hidden-panel', 'active-panel');
        loginPanel.classList.replace('active-panel', 'hidden-panel');
      }
    }

    function startCountdown(btn) {
      let seconds = 60;
      btn.disabled = true;
      btn.textContent = seconds + 's 后重发';
      btn.classList.add('text-[#B2BEC3]');

      const timer = setInterval(() => {
        seconds--;
        if (seconds <= 0) {
          clearInterval(timer);
          btn.disabled = false;
          btn.textContent = '获取验证码';
          btn.classList.remove('text-[#B2BEC3]');
        } else {
          btn.textContent = seconds + 's 后重发';
        }
      }, 1000);
    }

    function togglePwd(inputId, icon) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    function handleLogin() {
      const btn = document.getElementById('loginBtn');
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 登录中...';
      btn.disabled = true;

      setTimeout(() => {
        btn.innerHTML = '<span>登录</span>';
        btn.disabled = false;
        document.getElementById('loginSuccessModal').classList.remove('hidden');
      }, 1500);
    }

    function handleRegister() {
      const btn = document.getElementById('registerBtn');
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 注册中...';
      btn.disabled = true;

      setTimeout(() => {
        btn.innerHTML = '<span>注册</span>';
        btn.disabled = false;
        // Switch to login after register
        switchTab('login');
      }, 1500);
    }
  </script>

</body>
</html>
