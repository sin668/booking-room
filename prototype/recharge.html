<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>钱包充值</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4F6EF7',
            'primary-light': '#E8EDFF',
            'primary-dark': '#3A56D4',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #F5F6FA; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif; }
  </style>
</head>
<body class="max-w-[375px] mx-auto min-h-screen pb-24">

  <!-- iOS Status Bar -->
  <div class="bg-white pt-2 pb-0 px-4 flex items-center justify-between text-xs font-semibold" style="padding-top: env(safe-area-inset-top, 8px);">
    <span>9:41</span>
    <div class="flex items-center gap-1">
      <i class="fas fa-signal text-[10px]"></i>
      <i class="fas fa-wifi text-[10px]"></i>
      <i class="fas fa-battery-full text-[10px]"></i>
    </div>
  </div>

  <!-- Navigation Bar -->
  <div class="bg-white px-4 py-3 flex items-center relative">
    <i class="fas fa-chevron-left text-[#2D3436] text-base"></i>
    <span class="absolute left-1/2 -translate-x-1/2 text-[#2D3436] font-semibold text-base">钱包充值</span>
  </div>

  <!-- Balance Card -->
  <div class="mx-4 mt-4 bg-gradient-to-r from-primary to-purple-600 rounded-2xl p-5 text-white">
    <p class="text-white/60 text-xs">账户余额</p>
    <p class="text-3xl font-bold mt-1">¥256.00</p>
    <p class="text-white/60 text-xs mt-2">累计充值 ¥1,200.00</p>
  </div>

  <!-- Amount Selection -->
  <div class="mx-4 mt-4">
    <p class="text-[#2D3436] text-sm font-medium mb-3">选择充值金额</p>
    <div class="grid grid-cols-3 gap-3">
      <button onclick="selectAmount(this, '30')" class="bg-white rounded-xl py-3.5 text-center text-[#2D3436] font-medium text-sm border-2 border-transparent transition-all">
        ¥30
      </button>
      <button id="amount-selected" class="bg-primary/5 rounded-xl py-3.5 text-center text-primary font-bold text-sm border-2 border-primary transition-all">
        ¥50
      </button>
      <button onclick="selectAmount(this, '100')" class="bg-white rounded-xl py-3.5 text-center text-[#2D3436] font-medium text-sm border-2 border-transparent transition-all">
        ¥100
      </button>
      <button onclick="selectAmount(this, '200')" class="bg-white rounded-xl py-3.5 text-center text-[#2D3436] font-medium text-sm border-2 border-transparent transition-all">
        ¥200
      </button>
      <button onclick="selectAmount(this, '500')" class="bg-white rounded-xl py-3.5 text-center text-[#2D3436] font-medium text-sm border-2 border-transparent transition-all">
        ¥500
      </button>
      <button onclick="selectAmount(this, 'custom')" class="bg-white rounded-xl py-3.5 text-center text-[#636E72] font-medium text-sm border-2 border-transparent transition-all">
        自定义
      </button>
    </div>
  </div>

  <!-- Payment Method -->
  <div class="mx-4 mt-4 bg-white rounded-2xl p-4">
    <p class="text-[#2D3436] text-sm font-medium mb-3">支付方式</p>
    <!-- WeChat Pay -->
    <div class="flex items-center justify-between py-2.5">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-green-500 rounded-lg flex items-center justify-center">
          <i class="fab fa-weixin text-white text-lg"></i>
        </div>
        <span class="text-[#2D3436] text-sm">微信支付</span>
      </div>
      <div class="w-5 h-5 rounded-full border-2 border-primary flex items-center justify-center">
        <div class="w-3 h-3 bg-primary rounded-full"></div>
      </div>
    </div>
    <div class="border-t border-gray-100"></div>
    <!-- Alipay -->
    <div class="flex items-center justify-between py-2.5">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
          <i class="fab fa-alipay text-white text-lg"></i>
        </div>
        <span class="text-[#2D3436] text-sm">支付宝</span>
      </div>
      <div class="w-5 h-5 rounded-full border-2 border-gray-300"></div>
    </div>
  </div>

  <!-- Promo Code -->
  <div class="mx-4 mt-3 bg-white rounded-2xl p-4">
    <div class="flex items-center gap-3">
      <i class="fas fa-tag text-[#B2BEC3] text-sm"></i>
      <input type="text" placeholder="输入优惠码" class="flex-1 text-sm text-[#2D3436] placeholder-[#B2BEC3] outline-none bg-transparent">
      <button class="bg-primary-light text-primary text-xs font-medium px-3 py-1.5 rounded-full">兑换</button>
    </div>
  </div>

  <!-- Bottom Button -->
  <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[375px] bg-white px-4 py-3 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
    <button id="recharge-btn" class="bg-primary text-white rounded-full w-full py-3.5 text-sm font-semibold shadow-lg shadow-primary/30 active:bg-primary-dark transition-colors">
      立即充值 ¥50
    </button>
  </div>

  <script>
    function selectAmount(el, amount) {
      // Reset all
      document.querySelectorAll('.grid-cols-3 button').forEach(btn => {
        btn.className = 'bg-white rounded-xl py-3.5 text-center text-[#2D3436] font-medium text-sm border-2 border-transparent transition-all';
      });
      // Set selected
      el.className = 'bg-primary/5 rounded-xl py-3.5 text-center text-primary font-bold text-sm border-2 border-primary transition-all';
      // Update button text
      const btnText = amount === 'custom' ? '自定义金额' : '立即充值 ¥' + amount;
      document.getElementById('recharge-btn').textContent = btnText;
    }
  </script>
</body>
</html>
