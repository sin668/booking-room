<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>确认订单 - 光谷自习室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F6EF7',
                        'primary-light': '#E8EDFF',
                        'primary-dark': '#3A56D4',
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #F5F6FA;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeInUp 0.45s ease-out forwards; }
        .delay-1 { animation-delay: 0.08s; opacity: 0; }
        .delay-2 { animation-delay: 0.16s; opacity: 0; }
        .delay-3 { animation-delay: 0.24s; opacity: 0; }
        .delay-4 { animation-delay: 0.32s; opacity: 0; }

        .radio-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #E0E0E0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            cursor: pointer;
            flex-shrink: 0;
        }
        .radio-dot.active {
            border-color: #4F6EF7;
        }
        .radio-dot.active::after {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4F6EF7;
        }
    </style>
</head>
<body>
    <!-- iOS Status Bar -->
    <div class="bg-white">
        <div class="flex items-center justify-between px-6 pt-2 pb-1">
            <span class="text-sm font-semibold text-[#2D3436]">9:41</span>
            <div class="w-[120px] h-[34px] bg-black rounded-full"></div>
            <div class="flex items-center gap-1.5 text-xs text-[#2D3436]">
                <i class="fas fa-signal text-[11px]"></i>
                <i class="fas fa-wifi text-[11px]"></i>
                <i class="fas fa-battery-full text-[11px]"></i>
            </div>
        </div>
    </div>

    <!-- Navigation Bar -->
    <div class="bg-white h-12 flex items-center px-4 border-b border-gray-50">
        <a href="seat-select.html" class="w-9 h-9 flex items-center justify-center -ml-1">
            <i class="fas fa-chevron-left text-[#2D3436] text-base"></i>
        </a>
        <h1 class="flex-1 text-center text-base font-semibold text-[#2D3436] -ml-9">确认订单</h1>
    </div>

    <!-- Order Info Card -->
    <div class="mx-4 mt-3 bg-white rounded-2xl p-4 shadow-sm animate-in delay-1">
        <!-- Store Header -->
        <div class="flex items-center gap-3 mb-4">
            <div class="w-11 h-11 bg-primary-light rounded-xl flex items-center justify-center flex-shrink-0">
                <i class="fas fa-building text-primary"></i>
            </div>
            <div>
                <p class="text-sm font-bold text-[#2D3436]">光谷自习室</p>
                <p class="text-xs text-[#B2BEC3] mt-0.5">3楼</p>
            </div>
        </div>

        <!-- Divider -->
        <div class="border-t border-dashed border-gray-100 my-1"></div>

        <!-- Seat Info -->
        <div class="mt-3 flex items-center gap-3">
            <div class="w-11 h-11 bg-green-50 rounded-xl flex items-center justify-center flex-shrink-0">
                <i class="fas fa-chair text-green-500"></i>
            </div>
            <div>
                <p class="text-sm font-bold text-[#2D3436]">A-12号座位</p>
                <p class="text-xs text-[#B2BEC3] mt-0.5">静音区 · 靠窗</p>
            </div>
        </div>

        <!-- Divider -->
        <div class="border-t border-dashed border-gray-100 my-1"></div>

        <!-- Date & Time -->
        <div class="mt-3 space-y-2.5">
            <div class="flex items-center gap-3">
                <div class="w-5 flex justify-center">
                    <i class="far fa-calendar text-[#B2BEC3] text-xs"></i>
                </div>
                <span class="text-sm text-[#636E72]">2024年4月16日</span>
                <span class="text-xs text-[#B2BEC3] ml-1">周二</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="w-5 flex justify-center">
                    <i class="far fa-clock text-[#B2BEC3] text-xs"></i>
                </div>
                <span class="text-sm text-[#636E72]">10:00 - 12:00</span>
                <span class="text-xs bg-primary/10 text-primary px-1.5 py-0.5 rounded-full ml-1">2小时</span>
            </div>
        </div>
    </div>

    <!-- Coupon Row -->
    <div class="mx-4 mt-3 bg-white rounded-2xl p-4 shadow-sm flex items-center justify-between animate-in delay-2 cursor-pointer active:bg-gray-50 transition" onclick="showCouponToast()">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-red-50 rounded-lg flex items-center justify-center">
                <i class="fas fa-ticket text-red-400 text-sm"></i>
            </div>
            <span class="text-sm text-[#2D3436]">优惠券</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-sm font-semibold text-red-500">-¥3.00</span>
            <i class="fas fa-chevron-right text-[#B2BEC3] text-xs"></i>
        </div>
    </div>

    <!-- Payment Method -->
    <div class="mx-4 mt-3 bg-white rounded-2xl overflow-hidden shadow-sm animate-in delay-3">
        <div class="px-4 pt-4 pb-2">
            <h3 class="text-sm font-bold text-[#2D3436]">支付方式</h3>
        </div>

        <!-- Balance Option -->
        <div class="px-4 py-3 flex items-center justify-between cursor-pointer active:bg-gray-50 transition" onclick="selectPayment('balance')">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-primary-light rounded-lg flex items-center justify-center">
                    <i class="fas fa-wallet text-primary text-sm"></i>
                </div>
                <div>
                    <span class="text-sm text-[#2D3436]">账户余额</span>
                    <span class="text-xs text-[#B2BEC3] ml-2">¥256.00</span>
                </div>
            </div>
            <div class="radio-dot active" id="radio-balance"></div>
        </div>

        <div class="border-t border-gray-50 mx-4"></div>

        <!-- WeChat Pay Option -->
        <div class="px-4 py-3 flex items-center justify-between cursor-pointer active:bg-gray-50 transition" onclick="selectPayment('wechat')">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-green-50 rounded-lg flex items-center justify-center">
                    <i class="fab fa-weixin text-green-500 text-sm"></i>
                </div>
                <span class="text-sm text-[#2D3436]">微信支付</span>
            </div>
            <div class="radio-dot" id="radio-wechat"></div>
        </div>
    </div>

    <!-- Price Summary -->
    <div class="mx-4 mt-3 bg-white rounded-2xl p-4 shadow-sm animate-in delay-4">
        <div class="flex items-center justify-between mb-3">
            <span class="text-sm text-[#636E72]">座位费（静音区 · 2小时）</span>
            <span class="text-sm text-[#2D3436]">¥12.00</span>
        </div>
        <div class="flex items-center justify-between mb-3">
            <span class="text-sm text-[#636E72]">优惠券</span>
            <span class="text-sm text-red-500 font-medium">-¥3.00</span>
        </div>
        <div class="border-t border-dashed border-gray-100 pt-3 flex items-center justify-between">
            <span class="text-sm text-[#2D3436]">实付金额</span>
            <span class="text-xl font-bold text-primary">¥9.00</span>
        </div>
    </div>

    <!-- Spacer for bottom bar -->
    <div class="h-28"></div>

    <!-- Bottom Action -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-4 z-40 shadow-[0_-4px_20px_rgba(0,0,0,0.06)]" style="max-width: 430px; margin: 0 auto;">
        <div class="flex items-center justify-between">
            <div>
                <span class="text-xs text-[#B2BEC3]">合计</span>
                <span class="text-xl font-bold text-primary ml-1">¥9.00</span>
            </div>
            <button class="bg-primary text-white rounded-full px-10 py-3 font-semibold text-base shadow-lg shadow-primary/25 active:bg-primary-dark transition" onclick="handlePay()">
                立即支付
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-black/75 text-white text-sm px-6 py-3 rounded-xl z-[100] opacity-0 transition-opacity duration-300 pointer-events-none">
        <span id="toastText"></span>
    </div>

    <!-- Payment Success Modal -->
    <div id="successModal" class="fixed inset-0 z-[200] hidden" style="max-width: 430px; margin: 0 auto;">
        <div class="absolute inset-0 bg-black/50" onclick="closeModal()"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl p-6 pb-10 transform transition-transform duration-300" id="modalContent">
            <div class="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-6"></div>
            <div class="text-center">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-check text-green-500 text-2xl"></i>
                </div>
                <h3 class="text-lg font-bold text-[#2D3436] mb-1">预约成功</h3>
                <p class="text-sm text-[#B2BEC3] mb-6">订单编号：BK202404160001</p>

                <div class="bg-gray-50 rounded-2xl p-4 mb-6 text-left">
                    <div class="flex items-center justify-between mb-2.5">
                        <span class="text-xs text-[#B2BEC3]">门店</span>
                        <span class="text-sm text-[#2D3436] font-medium">光谷自习室 · 3楼</span>
                    </div>
                    <div class="flex items-center justify-between mb-2.5">
                        <span class="text-xs text-[#B2BEC3]">座位</span>
                        <span class="text-sm text-[#2D3436] font-medium">A-12号 · 静音区</span>
                    </div>
                    <div class="flex items-center justify-between mb-2.5">
                        <span class="text-xs text-[#B2BEC3]">时间</span>
                        <span class="text-sm text-[#2D3436] font-medium">10:00 - 12:00</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-xs text-[#B2BEC3]">支付金额</span>
                        <span class="text-sm text-primary font-bold">¥9.00</span>
                    </div>
                </div>

                <button class="w-full bg-primary text-white rounded-full py-3 font-semibold text-base" onclick="closeModal()">
                    完成
                </button>
            </div>
        </div>
    </div>

    <script>
        function selectPayment(method) {
            document.getElementById('radio-balance').classList.remove('active');
            document.getElementById('radio-wechat').classList.remove('active');
            document.getElementById('radio-' + method).classList.add('active');
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            document.getElementById('toastText').textContent = text;
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 1800);
        }

        function showCouponToast() {
            showToast('已选择1张优惠券');
        }

        function handlePay() {
            const btn = event.target;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>支付中...';
            btn.disabled = true;
            btn.style.opacity = '0.7';

            setTimeout(() => {
                btn.innerHTML = '立即支付';
                btn.disabled = false;
                btn.style.opacity = '1';
                showSuccessModal();
            }, 1500);
        }

        function showSuccessModal() {
            const modal = document.getElementById('successModal');
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('successModal');
            modal.classList.add('hidden');
            document.body.style.overflow = '';
        }
    </script>
</body>
</html>
