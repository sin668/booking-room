<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>学习排行榜</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4F6EF7',
            'primary-light': '#E8EDFF',
            'primary-dark': '#3A56D4',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #F5F6FA; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif; }
    .podium-card { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
  </style>
</head>
<body class="max-w-[375px] mx-auto min-h-screen pb-6">

  <!-- iOS Status Bar -->
  <div class="bg-white pt-2 pb-0 px-4 flex items-center justify-between text-xs font-semibold" style="padding-top: env(safe-area-inset-top, 8px);">
    <span>9:41</span>
    <div class="flex items-center gap-1">
      <i class="fas fa-signal text-[10px]"></i>
      <i class="fas fa-wifi text-[10px]"></i>
      <i class="fas fa-battery-full text-[10px]"></i>
    </div>
  </div>

  <!-- Navigation Bar -->
  <div class="bg-white px-4 py-3 flex items-center relative">
    <i class="fas fa-chevron-left text-[#2D3436] text-base"></i>
    <span class="absolute left-1/2 -translate-x-1/2 text-[#2D3436] font-semibold text-base">学习排行榜</span>
  </div>

  <!-- Time Tabs -->
  <div class="bg-white mt-px flex px-4">
    <button onclick="switchTimeTab(this, 0)" class="time-tab flex-1 py-3 text-sm font-medium text-center text-primary border-b-2 border-primary transition-all">
      日榜
    </button>
    <button onclick="switchTimeTab(this, 1)" class="time-tab flex-1 py-3 text-sm font-medium text-center text-[#636E72] border-b-2 border-transparent transition-all">
      周榜
    </button>
    <button onclick="switchTimeTab(this, 2)" class="time-tab flex-1 py-3 text-sm font-medium text-center text-[#636E72] border-b-2 border-transparent transition-all">
      月榜
    </button>
  </div>

  <!-- Top 3 Podium -->
  <div class="mx-4 mt-4 flex justify-center items-end gap-3 px-2">
    <!-- 2nd Place -->
    <div class="podium-card w-1/3">
      <div class="relative mb-2">
        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=80&h=80&fit=crop&crop=face"
             class="w-12 h-12 rounded-full object-cover border-2 border-gray-300 mx-auto" alt="李明">
        <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-5 h-5 bg-gray-400 rounded-full flex items-center justify-center">
          <span class="text-white text-[10px] font-bold">2</span>
        </div>
      </div>
      <p class="text-[#2D3436] text-xs font-medium mt-1">李明</p>
      <p class="text-[#636E72] text-[10px] mt-0.5">6.5h</p>
      <div class="w-full h-24 bg-gray-100 rounded-t-2xl mt-2 flex items-center justify-center">
        <i class="fas fa-medal text-gray-400 text-2xl"></i>
      </div>
    </div>

    <!-- 1st Place -->
    <div class="podium-card w-1/3">
      <div class="relative mb-2">
        <div class="absolute -top-5 left-1/2 -translate-x-1/2 z-10">
          <i class="fas fa-crown text-yellow-400 text-lg"></i>
        </div>
        <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=80&h=80&fit=crop&crop=face"
             class="w-14 h-14 rounded-full object-cover border-2 border-yellow-400 mx-auto mt-2" alt="张三">
        <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-5 h-5 bg-yellow-400 rounded-full flex items-center justify-center">
          <span class="text-white text-[10px] font-bold">1</span>
        </div>
      </div>
      <p class="text-[#2D3436] text-xs font-bold mt-1">张三</p>
      <p class="text-primary text-[10px] font-semibold mt-0.5">8.0h</p>
      <div class="w-full h-32 bg-yellow-50 rounded-t-2xl mt-2 flex items-center justify-center border border-yellow-100">
        <i class="fas fa-trophy text-yellow-400 text-3xl"></i>
      </div>
    </div>

    <!-- 3rd Place -->
    <div class="podium-card w-1/3">
      <div class="relative mb-2">
        <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=80&h=80&fit=crop&crop=face"
             class="w-12 h-12 rounded-full object-cover border-2 border-orange-300 mx-auto" alt="王五">
        <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-5 h-5 bg-orange-400 rounded-full flex items-center justify-center">
          <span class="text-white text-[10px] font-bold">3</span>
        </div>
      </div>
      <p class="text-[#2D3436] text-xs font-medium mt-1">王五</p>
      <p class="text-[#636E72] text-[10px] mt-0.5">5.0h</p>
      <div class="w-full h-20 bg-orange-50 rounded-t-2xl mt-2 flex items-center justify-center">
        <i class="fas fa-medal text-orange-300 text-2xl"></i>
      </div>
    </div>
  </div>

  <!-- Ranking List -->
  <div class="mx-4 mt-4 bg-white rounded-2xl overflow-hidden">
    <!-- Rank 4 -->
    <div class="flex items-center px-4 py-3 border-b border-gray-50">
      <span class="w-6 text-center text-[#636E72] text-sm font-medium">4</span>
      <img src="https://images.unsplash.com/photo-1527980965255-d3b416303d12?w=60&h=60&fit=crop&crop=face"
           class="w-9 h-9 rounded-full object-cover ml-3 mr-3" alt="">
      <span class="text-[#2D3436] text-sm flex-1">赵六</span>
      <span class="text-[#2D3436] text-sm font-medium mr-3">4.5h</span>
      <i class="fas fa-arrow-up text-green-500 text-xs"></i>
    </div>
    <!-- Rank 5 -->
    <div class="flex items-center px-4 py-3 border-b border-gray-50">
      <span class="w-6 text-center text-[#636E72] text-sm font-medium">5</span>
      <img src="https://images.unsplash.com/photo-1544725176-7c40e128a544?w=60&h=60&fit=crop&crop=face"
           class="w-9 h-9 rounded-full object-cover ml-3 mr-3" alt="">
      <span class="text-[#2D3436] text-sm flex-1">陈七</span>
      <span class="text-[#2D3436] text-sm font-medium mr-3">4.0h</span>
      <i class="fas fa-arrow-down text-red-400 text-xs"></i>
    </div>
    <!-- Rank 6 -->
    <div class="flex items-center px-4 py-3 border-b border-gray-50">
      <span class="w-6 text-center text-[#636E72] text-sm font-medium">6</span>
      <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=60&h=60&fit=crop&crop=face"
           class="w-9 h-9 rounded-full object-cover ml-3 mr-3" alt="">
      <span class="text-[#2D3436] text-sm flex-1">孙八</span>
      <span class="text-[#2D3436] text-sm font-medium mr-3">3.8h</span>
      <i class="fas fa-arrow-up text-green-500 text-xs"></i>
    </div>
    <!-- Rank 7 -->
    <div class="flex items-center px-4 py-3 border-b border-gray-50">
      <span class="w-6 text-center text-[#636E72] text-sm font-medium">7</span>
      <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?w=60&h=60&fit=crop&crop=face"
           class="w-9 h-9 rounded-full object-cover ml-3 mr-3" alt="">
      <span class="text-[#2D3436] text-sm flex-1">周九</span>
      <span class="text-[#2D3436] text-sm font-medium mr-3">3.5h</span>
      <i class="fas fa-arrow-down text-red-400 text-xs"></i>
    </div>
    <!-- Rank 8 -->
    <div class="flex items-center px-4 py-3 border-b border-gray-50">
      <span class="w-6 text-center text-[#636E72] text-sm font-medium">8</span>
      <img src="https://images.unsplash.com/photo-1564564321837-a57b7070ac4f?w=60&h=60&fit=crop&crop=face"
           class="w-9 h-9 rounded-full object-cover ml-3 mr-3" alt="">
      <span class="text-[#2D3436] text-sm flex-1">吴十</span>
      <span class="text-[#2D3436] text-sm font-medium mr-3">3.2h</span>
      <i class="fas fa-arrow-up text-green-500 text-xs"></i>
    </div>
    <!-- Rank 9 -->
    <div class="flex items-center px-4 py-3 border-b border-gray-50">
      <span class="w-6 text-center text-[#636E72] text-sm font-medium">9</span>
      <img src="https://images.unsplash.com/photo-1552058544-f2b08422138a?w=60&h=60&fit=crop&crop=face"
           class="w-9 h-9 rounded-full object-cover ml-3 mr-3" alt="">
      <span class="text-[#2D3436] text-sm flex-1">郑十一</span>
      <span class="text-[#2D3436] text-sm font-medium mr-3">3.0h</span>
      <i class="fas fa-arrow-down text-red-400 text-xs"></i>
    </div>
    <!-- Rank 10 -->
    <div class="flex items-center px-4 py-3">
      <span class="w-6 text-center text-[#636E72] text-sm font-medium">10</span>
      <img src="https://images.unsplash.com/photo-1580489944761-15a19d654956?w=60&h=60&fit=crop&crop=face"
           class="w-9 h-9 rounded-full object-cover ml-3 mr-3" alt="">
      <span class="text-[#2D3436] text-sm flex-1">冯十二</span>
      <span class="text-[#2D3436] text-sm font-medium mr-3">2.8h</span>
      <i class="fas fa-arrow-up text-green-500 text-xs"></i>
    </div>
  </div>

  <!-- My Ranking Card -->
  <div class="mx-4 mt-3 bg-primary/5 rounded-2xl p-3 flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
        <i class="fas fa-user text-primary text-xs"></i>
      </div>
      <div>
        <p class="text-[#2D3436] text-sm font-medium">我的排名</p>
        <p class="text-[#636E72] text-xs">今日学习 3.5h</p>
      </div>
    </div>
    <div class="text-right">
      <p class="text-primary text-lg font-bold">第15名</p>
    </div>
  </div>

  <script>
    function switchTimeTab(el, index) {
      document.querySelectorAll('.time-tab').forEach(tab => {
        tab.className = 'time-tab flex-1 py-3 text-sm font-medium text-center text-[#636E72] border-b-2 border-transparent transition-all';
      });
      el.className = 'time-tab flex-1 py-3 text-sm font-medium text-center text-primary border-b-2 border-primary transition-all';
    }
  </script>
</body>
</html>
