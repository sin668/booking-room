<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的 - 学习空间预约</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4F6EF7',
            'primary-light': '#E8EDFF',
            'primary-dark': '#3A56D4',
          }
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
    /* Hide scrollbar */
    ::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-[#F5F6FA] pb-24 min-h-screen">

  <!-- iOS Status Bar -->
  <div class="fixed top-0 left-0 right-0 z-50 bg-primary h-11 text-white flex items-center justify-between px-6">
    <span class="text-sm font-semibold">9:41</span>
    <div class="w-[126px] h-[37px] bg-black rounded-full mx-auto"></div>
    <div class="flex items-center gap-1.5">
      <i class="fa-solid fa-signal text-xs"></i>
      <i class="fa-solid fa-wifi text-xs"></i>
      <i class="fa-solid fa-battery-full text-sm"></i>
    </div>
  </div>

  <!-- User Header -->
  <div class="bg-gradient-to-b from-primary to-[#6C5CE7] pt-[68px] pb-8 px-4 relative">
    <!-- Settings Icon -->
    <div class="absolute top-[56px] right-4">
      <i class="fa-solid fa-gear text-white/70 text-lg"></i>
    </div>

    <div class="flex items-center gap-3">
      <!-- Avatar -->
      <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=200&h=200&fit=crop&crop=face"
           alt="Avatar"
           class="w-16 h-16 rounded-full border-2 border-white/30 object-cover">
      <div>
        <div class="flex items-center gap-2">
          <span class="text-white font-bold text-lg">学习达人</span>
          <span class="bg-yellow-400 text-yellow-900 text-xs px-2 py-0.5 rounded-full font-medium">VIP会员</span>
        </div>
        <p class="text-white/70 text-xs mt-1">已累计学习 128 小时</p>
      </div>
    </div>
  </div>

  <!-- Stats Row -->
  <div class="bg-white rounded-2xl mx-4 -mt-4 relative z-10 p-4">
    <div class="grid grid-cols-3 text-center">
      <!-- Balance -->
      <div class="flex flex-col items-center">
        <span class="text-primary font-bold text-lg">&#165;256.00</span>
        <span class="text-gray-400 text-xs mt-1">账户余额</span>
      </div>
      <!-- Divider -->
      <div class="flex flex-col items-center border-l border-gray-100">
        <span class="text-orange-500 font-bold text-lg">3</span>
        <span class="text-gray-400 text-xs mt-1">卡券</span>
      </div>
      <!-- Divider -->
      <div class="flex flex-col items-center border-l border-gray-100">
        <span class="text-green-500 font-bold text-lg">128h</span>
        <span class="text-gray-400 text-xs mt-1">学习时长</span>
      </div>
    </div>
  </div>

  <!-- Menu List -->
  <div class="mx-4 mt-4 bg-white rounded-2xl overflow-hidden">

    <!-- Section 1: 学习服务 -->
    <div class="px-4 pt-3 pb-1">
      <span class="text-xs text-gray-400 font-medium">学习服务</span>
    </div>

    <!-- 学习记录 -->
    <div class="flex items-center px-4 py-3.5">
      <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center mr-3">
        <i class="fa-solid fa-clock-rotate-left text-primary text-sm"></i>
      </div>
      <span class="text-sm text-[#2D3436] flex-1">学习记录</span>
      <div class="flex items-center gap-1.5">
        <span class="text-xs text-[#B2BEC3]">查看全部</span>
        <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
      </div>
    </div>

    <!-- 排行榜 -->
    <div class="flex items-center px-4 py-3.5">
      <div class="w-8 h-8 rounded-lg bg-yellow-500/10 flex items-center justify-center mr-3">
        <i class="fa-solid fa-trophy text-yellow-500 text-sm"></i>
      </div>
      <span class="text-sm text-[#2D3436] flex-1">排行榜</span>
      <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
    </div>

    <!-- 我的收藏 -->
    <div class="flex items-center px-4 py-3.5">
      <div class="w-8 h-8 rounded-lg bg-red-400/10 flex items-center justify-center mr-3">
        <i class="fa-solid fa-heart text-red-400 text-sm"></i>
      </div>
      <span class="text-sm text-[#2D3436] flex-1">我的收藏</span>
      <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
    </div>

    <!-- Divider -->
    <div class="border-t border-gray-50 mx-4"></div>

    <!-- Section 2: 会员服务 -->
    <div class="px-4 pt-3 pb-1">
      <span class="text-xs text-gray-400 font-medium">会员服务</span>
    </div>

    <!-- 钱包充值 -->
    <div class="flex items-center px-4 py-3.5">
      <div class="w-8 h-8 rounded-lg bg-green-500/10 flex items-center justify-center mr-3">
        <i class="fa-solid fa-wallet text-green-500 text-sm"></i>
      </div>
      <span class="text-sm text-[#2D3436] flex-1">钱包充值</span>
      <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
    </div>

    <!-- 卡券包 -->
    <div class="flex items-center px-4 py-3.5">
      <div class="w-8 h-8 rounded-lg bg-orange-500/10 flex items-center justify-center mr-3">
        <i class="fa-solid fa-ticket text-orange-500 text-sm"></i>
      </div>
      <span class="text-sm text-[#2D3436] flex-1">卡券包</span>
      <div class="flex items-center gap-1.5">
        <span class="text-xs text-[#B2BEC3]">3张可用</span>
        <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
      </div>
    </div>

    <!-- 储物柜 -->
    <div class="flex items-center px-4 py-3.5">
      <div class="w-8 h-8 rounded-lg bg-purple-500/10 flex items-center justify-center mr-3">
        <i class="fa-solid fa-lock text-purple-500 text-sm"></i>
      </div>
      <span class="text-sm text-[#2D3436] flex-1">储物柜</span>
      <div class="flex items-center gap-1.5">
        <span class="text-xs text-[#B2BEC3]">未使用</span>
        <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
      </div>
    </div>

    <!-- Divider -->
    <div class="border-t border-gray-50 mx-4"></div>

    <!-- Section 3: 其他 -->
    <div class="px-4 pt-3 pb-1">
      <span class="text-xs text-gray-400 font-medium">其他</span>
    </div>

    <!-- 意见反馈 -->
    <div class="flex items-center px-4 py-3.5">
      <div class="w-8 h-8 rounded-lg bg-blue-400/10 flex items-center justify-center mr-3">
        <i class="fa-solid fa-comment-dots text-blue-400 text-sm"></i>
      </div>
      <span class="text-sm text-[#2D3436] flex-1">意见反馈</span>
      <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
    </div>

    <!-- 关于我们 -->
    <div class="flex items-center px-4 py-3.5">
      <div class="w-8 h-8 rounded-lg bg-gray-400/10 flex items-center justify-center mr-3">
        <i class="fa-solid fa-circle-info text-gray-400 text-sm"></i>
      </div>
      <span class="text-sm text-[#2D3436] flex-1">关于我们</span>
      <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
    </div>

  </div>

  <!-- Member Card Promo -->
  <div class="mx-4 mt-4 mb-6">
    <div class="bg-gradient-to-r from-[#2D1B69] to-[#6C5CE7] rounded-2xl p-4 relative overflow-hidden">
      <!-- Decorative circles -->
      <div class="absolute -top-6 -right-6 w-24 h-24 bg-white/5 rounded-full"></div>
      <div class="absolute -bottom-4 -right-2 w-16 h-16 bg-white/5 rounded-full"></div>

      <div class="flex items-center justify-between relative z-10">
        <div>
          <h3 class="text-white font-bold text-base">升级超级会员</h3>
          <p class="text-white/60 text-xs mt-1">享8折优惠 + 专属座位 + 优先预约</p>
        </div>
        <button class="bg-white text-primary rounded-full px-4 py-1.5 text-xs font-semibold whitespace-nowrap">
          立即开通
        </button>
      </div>
    </div>
  </div>

  <!-- Bottom Tab Bar -->
  <div class="fixed bottom-0 left-0 right-0 z-50 bg-white border-t border-gray-100">
    <div class="grid grid-cols-4 py-2 pb-5">
      <!-- 首页 -->
      <div class="flex flex-col items-center gap-0.5">
        <i class="fa-regular fa-house text-gray-400 text-xl"></i>
        <span class="text-[10px] text-gray-400">首页</span>
      </div>
      <!-- 预约 -->
      <div class="flex flex-col items-center gap-0.5">
        <i class="fa-regular fa-calendar-check text-gray-400 text-xl"></i>
        <span class="text-[10px] text-gray-400">预约</span>
      </div>
      <!-- 订单 -->
      <div class="flex flex-col items-center gap-0.5">
        <i class="fa-regular fa-receipt text-gray-400 text-xl"></i>
        <span class="text-[10px] text-gray-400">订单</span>
      </div>
      <!-- 我的 (Active) -->
      <div class="flex flex-col items-center gap-0.5">
        <i class="fa-solid fa-user text-primary text-xl"></i>
        <span class="text-[10px] text-primary font-medium">我的</span>
      </div>
    </div>
  </div>

</body>
</html>
